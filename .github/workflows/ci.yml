name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check remy/

      - name: Run black (check mode)
        run: black --check remy/ tests/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  self-scan:
    name: Remy Self-Scan (secrets only)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install remy
        run: pip install -e .

      - name: Run Remy self-scan (secrets gate)
        run: |
          # Create a minimal config so the scan can run without a wizard
          mkdir -p ~/.remy
          cat > ~/.remy/config.toml <<EOF
          provider = "groq"
          model = "llama-3.3-70b-versatile"
          [scan_defaults]
          deep = false
          max_file_size_kb = 1000
          respect_gitignore = true
          EOF
          # Secrets-only scan on the repo itself (exit 0 even if findings — only gate on errors)
          remy scan . --secrets-only --format json --output /tmp/remy-self-scan.json || true
          # Parse and fail if CRITICAL secrets found (exit code 2 = critical/high findings)
          python -c "
          import json, sys
          data = json.load(open('/tmp/remy-self-scan.json'))
          crit = data['summary']['critical']
          if crit > 0:
              print(f'FAIL: {crit} CRITICAL secrets found in repo!')
              sys.exit(1)
          print(f'OK: No critical secrets found. ({data[\"summary\"][\"total\"]} total findings)')
          "
