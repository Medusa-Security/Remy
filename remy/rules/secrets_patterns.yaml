# Remy Secrets Pattern Rules
# Format: name, pattern, severity, cwe, remediation_hint
# These supplement the built-in regex rules in secrets_scanner.py

version: "1.0"
rules:
  - name: "SendGrid API Key"
    pattern: 'SG\.[A-Za-z0-9_\-]{22}\.[A-Za-z0-9_\-]{43}'
    severity: CRITICAL
    cwe: "CWE-798"
    remediation: "Revoke in SendGrid settings. Move to environment variable."

  - name: "Twilio Account SID"
    pattern: 'AC[a-f0-9]{32}'
    severity: HIGH
    cwe: "CWE-798"
    remediation: "Revoke in Twilio console. Store in environment variable."

  - name: "Twilio Auth Token"
    pattern: 'twilio.*[a-f0-9]{32}'
    severity: CRITICAL
    cwe: "CWE-798"
    remediation: "Rotate in Twilio console. Store in environment variable."

  - name: "Mailgun API Key"
    pattern: 'key-[a-z0-9]{32}'
    severity: HIGH
    cwe: "CWE-798"
    remediation: "Revoke in Mailgun settings. Store in environment variable."

  - name: "Heroku API Key"
    pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
    severity: HIGH
    cwe: "CWE-798"
    remediation: "Revoke in Heroku account settings. Use environment variables."

  - name: "Google API Key"
    pattern: 'AIza[0-9A-Za-z\\-_]{35}'
    severity: HIGH
    cwe: "CWE-798"
    remediation: "Restrict key in GCP Console. Rotate and store in environment variable."

  - name: "Firebase Server Key"
    pattern: 'AAAA[A-Za-z0-9_-]{7}:[A-Za-z0-9_-]{140}'
    severity: CRITICAL
    cwe: "CWE-798"
    remediation: "Revoke in Firebase console. Store in environment variable."

  - name: "Slack Webhook URL"
    pattern: 'https://hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]+'
    severity: HIGH
    cwe: "CWE-798"
    remediation: "Revoke in Slack app settings. Store in environment variable."

  - name: "npm Auth Token"
    pattern: '//registry\.npmjs\.org/:_authToken=[a-zA-Z0-9\-]+'
    severity: CRITICAL
    cwe: "CWE-798"
    remediation: "Revoke on npmjs.com. Never commit .npmrc with auth tokens."

  - name: "Docker Hub Token"
    pattern: 'dckr_pat_[A-Za-z0-9_\-]{27,}'
    severity: HIGH
    cwe: "CWE-798"
    remediation: "Revoke in Docker Hub account settings."

  - name: "Azure Storage Account Key"
    pattern: 'AccountKey=[A-Za-z0-9+/=]{88}'
    severity: CRITICAL
    cwe: "CWE-798"
    remediation: "Rotate in Azure portal. Store in Azure Key Vault."

  - name: "Shopify Access Token"
    pattern: 'shpat_[a-fA-F0-9]{32}'
    severity: CRITICAL
    cwe: "CWE-798"
    remediation: "Revoke in Shopify partner dashboard."

  - name: "DigitalOcean Personal Access Token"
    pattern: 'dop_v1_[a-z0-9]{64}'
    severity: CRITICAL
    cwe: "CWE-798"
    remediation: "Revoke in DigitalOcean API settings."

  - name: "PyPI API Token"
    pattern: 'pypi-[A-Za-z0-9_\-]{50,}'
    severity: CRITICAL
    cwe: "CWE-798"
    remediation: "Revoke on pypi.org. Use trusted publishing instead."
